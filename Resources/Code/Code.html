<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Karin Terminal</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/tokyo-night-dark.min.css">
    <style>
        :root {
            --bg-main: #0d1117;
            --card-bg: #11141a;
            --box-bg: rgba(18, 22, 28, 0.7);
            --border-dim: #262c36;
            --text-dim: #6e7681;
            --text-bright: #e6edf3;
            --accent-purple: #9f7aea;
            --accent-cyan: #4fd1c5;
            --accent-orange: #f6ad55;
            --accent-green: #48bb78;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            width: 850px;
            background-color: #0d1117; /* 强制背景色，防止透明截图问题 */
            font-family: 'Consolas', 'Monaco', 'Courier New', monospace;
            padding: 30px;
        }

        .main-card {
            background-color: var(--card-bg);
            border: 1px solid var(--border-dim);
            border-radius: 20px;
            padding: 35px;
            position: relative;
            overflow: hidden;
            box-shadow: 0 30px 60px rgba(0, 0, 0, 0.5);
        }

        /* 水印装饰 */
        .watermark {
            position: absolute;
            top: -10px;
            right: 20px;
            font-size: 110px;
            font-weight: 900;
            color: rgba(255, 255, 255, 0.03);
            font-style: italic;
            z-index: 0;
        }

        /* 头部 */
        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 30px;
            position: relative;
            z-index: 2;
        }

        .brand { display: flex; align-items: center; gap: 15px; }
        .logo-box {
            width: 42px; height: 42px;
            background: linear-gradient(135deg, #322659 0%, #1a202c 100%);
            border: 1px solid #553c9a;
            border-radius: 10px;
            display: flex; justify-content: center; align-items: center;
            color: #f687b3; font-weight: bold;
        }

        .brand-text h1 { font-size: 22px; color: var(--text-bright); line-height: 1; }
        .brand-text h1 span { color: var(--accent-purple); }
        .brand-text p { font-size: 9px; color: var(--text-dim); letter-spacing: 2px; margin-top: 4px; }

        .status-group { display: flex; gap: 30px; }
        .status-item { text-align: right; }
        .status-item .time, .status-item .num { 
            display: block; font-size: 18px; color: var(--text-bright); font-weight: bold; 
        }
        .status-item .sub { font-size: 10px; color: var(--text-dim); text-transform: uppercase; }

        .exec-badge {
            padding: 4px 12px;
            background: rgba(72, 187, 120, 0.1);
            border: 1px solid rgba(72, 187, 120, 0.3);
            border-radius: 20px;
            color: var(--accent-green);
            font-size: 11px;
            display: flex; align-items: center; gap: 6px;
        }
        .exec-badge .dot { width: 6px; height: 6px; background: var(--accent-green); border-radius: 50%; box-shadow: 0 0 8px var(--accent-green); }

        /* 通用容器 */
        .box {
            background: var(--box-bg);
            border: 1px solid var(--border-dim);
            border-radius: 12px;
            padding: 18px;
            margin-top: 10px;
        }

        .section { margin-bottom: 25px; position: relative; z-index: 1; }
        .section-label {
            font-size: 10px;
            color: #f687b3;
            letter-spacing: 2px;
            display: flex; align-items: center;
            font-weight: bold;
        }
        .section-label::before { content: ""; width: 12px; height: 2px; background: #f687b3; margin-right: 8px; }

        .command-preview { border-left: 3px solid var(--accent-purple); color: var(--text-bright); }
        .prompt { color: var(--accent-cyan); margin-right: 8px; }

        /* 分隔线 */
        .divider {
            display: flex; align-items: center; gap: 15px; margin: 20px 0;
            font-size: 10px; color: var(--text-dim);
        }
        .divider-line { flex: 1; border-top: 1px dashed var(--border-dim); }

        /* 代码输出区域 */
        .output-area { overflow: hidden; }
        .code-wrapper {
            color: var(--text-bright);
            font-size: 14px;
            line-height: 1.6;
            white-space: pre-wrap;
            word-break: break-all;
        }

        /* 适配 ansi_up 生成的颜色 */
        pre, code { background: transparent !important; font-family: inherit !important; }

        /* 底部 */
        .footer {
            margin-top: 30px; padding-top: 20px;
            border-top: 1px solid var(--border-dim);
            display: flex; justify-content: space-between;
            font-size: 11px; color: var(--text-dim);
        }
        .footer-left { display: flex; align-items: center; gap: 8px; }
        .footer-icon { color: var(--accent-orange); font-weight: bold; }
        .plugin-info { color: var(--accent-cyan); }
    </style>
</head>
<body>
    <div class="main-card">
        <div class="watermark">RUN</div>

        <header class="header">
            <div class="brand">
                <div class="logo-box">&lt;/&gt;</div>
                <div class="brand-text">
                    <h1>TRSS<span>.</span></h1>
                    <p>REMOTE RUNNER</p>
                </div>
            </div>
            <div class="status-group">
                <div class="status-item">
                    <span class="time" id="current-time">--:--:--</span>
                    <span class="sub">CST +8</span>
                </div>
                <div class="exec-badge">
                    <span class="dot"></span> ACTIVE
                </div>
            </div>
        </header>

        <section class="section">
            <div class="section-label">COMMAND</div>
            <div class="box command-preview">
                <span class="prompt">$</span> Remote Command Execution
            </div>
        </section>

        <div class="divider">
            <div class="divider-left">$_ CMD</div>
            <div class="divider-line"></div>
            <div class="divider-right">STDOUT</div>
        </div>

        <section class="section">
            <div class="section-label">OUTPUT</div>
            <div class="box output-area">
                <div class="code-wrapper">{{@Code}}</div>
            </div>
        </section>

        <footer class="footer">
            <div class="footer-left">
                <span class="footer-icon">&lt;&gt;</span>
                <span class="plugin-info">TRSS-Plugin v3.0</span>
            </div>
            <div class="footer-right">Powered by TRSS &bull; 2026</div>
        </footer>
    </div>

    <script>
        function updateTime() {
            const now = new Date();
            document.getElementById('current-time').innerText = now.toTimeString().split(' ')[0];
        }
        updateTime();
    </script>
</body>
</html>
